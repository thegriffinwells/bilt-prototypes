<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>Bilt — Prototype Hub</title>
<style>
  @font-face {
    font-family: 'GT America';
    src: local('GT America VF'), local('GT America');
    font-weight: 100 900;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'GT America', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a2332 url('Hero.png') center/cover no-repeat fixed;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Logo */
  .logo {
    position: absolute;
    top: 16px;
    left: 20px;
    z-index: 10;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .logo:hover { opacity: 0.7; }

  /* Main Area */
  .main {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* Iframe */
  .preview-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    display: none;
  }
  .preview-frame.active { display: block; }

  /* Loading overlay */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: #1a2332 url('Hero.png') center/cover no-repeat;
    z-index: 5;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .loading-overlay.hidden { opacity: 0; }

  /* Floating button base */
  .fab {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(15, 20, 30, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    transition: all 0.2s;
  }
  .fab:hover {
    background: rgba(15, 20, 30, 0.95);
    color: #fff;
  }

  /* Bottom-right button group */
  .fab-group {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  /* TOC Panel */
  .toc-wrap { position: relative; }

  .toc-panel {
    position: absolute;
    bottom: 48px;
    right: 0;
    width: 240px;
    background: rgba(15, 20, 30, 0.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    padding: 12px;
    display: none;
    flex-direction: column;
    gap: 2px;
    animation: panelIn 0.15s ease-out;
  }
  .toc-panel.open { display: flex; }

  .toc-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: rgba(255, 255, 255, 0.6);
    font-family: inherit;
    font-size: 13px;
    font-weight: 470;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    text-align: left;
  }
  .toc-item:hover {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.85);
  }
  .toc-item.active {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
  }

  .toc-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #48bb78;
    flex-shrink: 0;
  }

  .toc-date {
    font-size: 11px;
    opacity: 0.4;
    font-weight: 400;
    margin-left: auto;
  }

  /* Info Panel */
  .info-wrap { position: relative; }

  .info-panel {
    position: absolute;
    bottom: 48px;
    right: 0;
    width: 260px;
    background: rgba(15, 20, 30, 0.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 16px;
    animation: panelIn 0.15s ease-out;
  }
  .info-panel.open { display: flex; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .info-panel h2 {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -0.2px;
  }

  .info-field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .info-label {
    font-size: 10px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .info-value {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.8);
    line-height: 1.4;
  }
  .info-value a {
    color: #63b3ed;
    text-decoration: none;
  }
  .info-value a:hover { text-decoration: underline; }

  .open-btn {
    display: block;
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.7);
    font-family: inherit;
    font-size: 13px;
    font-weight: 470;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
    text-decoration: none;
  }
  .open-btn:hover {
    background: rgba(255, 255, 255, 0.14);
    color: #fff;
  }
</style>
</head>
<body>

<img class="logo" src="favicon.ico" width="24" height="24" alt="Bilt">
<div class="main">
  <iframe class="preview-frame" id="previewFrame"></iframe>
  <div class="loading-overlay" id="loadingOverlay" style="display: none;"></div>

  <div class="fab-group">
    <!-- TOC -->
    <div class="toc-wrap">
      <div class="toc-panel" id="tocPanel"></div>
      <button class="fab" id="tocToggle" title="Prototypes">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Info -->
    <div class="info-wrap" id="infoWrap" style="display: none;">
      <div class="info-panel" id="infoPanel">
        <h2 id="infoName"></h2>
        <div class="info-field">
          <span class="info-label">Description</span>
          <span class="info-value" id="infoDesc"></span>
        </div>
        <div class="info-field">
          <span class="info-label">Created</span>
          <span class="info-value" id="infoDate"></span>
        </div>
        <div class="info-field">
          <span class="info-label">Project</span>
          <span class="info-value" id="infoProject"></span>
        </div>
        <a class="open-btn" id="openBtn" href="#" target="_blank">Open in new tab &#8599;</a>
      </div>
      <button class="fab" id="infoToggle" title="Prototype info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  let prototypes = [];
  let selected = null;
  let tocOpen = false;
  let infoOpen = false;

  async function init() {
    const res = await fetch('prototypes.json');
    prototypes = await res.json();
    prototypes.sort((a, b) => b.created.localeCompare(a.created));

    document.getElementById('tocToggle').addEventListener('click', () => {
      tocOpen = !tocOpen;
      if (tocOpen) { infoOpen = false; document.getElementById('infoPanel').classList.remove('open'); }
      renderToc();
    });

    document.getElementById('infoToggle').addEventListener('click', () => {
      infoOpen = !infoOpen;
      if (infoOpen) { tocOpen = false; document.getElementById('tocPanel').classList.remove('open'); }
      document.getElementById('infoPanel').classList.toggle('open', infoOpen);
    });

    const latest = prototypes[0];
    if (latest) selectPrototype(latest.id);
  }

  function renderToc() {
    const panel = document.getElementById('tocPanel');
    panel.innerHTML = prototypes.map(p => `
      <button class="toc-item${selected === p.id ? ' active' : ''}" data-id="${p.id}">
        <span class="toc-dot"></span>
        ${p.name}
        <span class="toc-date">${formatDate(p.created)}</span>
      </button>
    `).join('');

    panel.querySelectorAll('.toc-item').forEach(item => {
      item.addEventListener('click', () => {
        selectPrototype(item.dataset.id);
        tocOpen = false;
        panel.classList.remove('open');
      });
    });

    panel.classList.toggle('open', tocOpen);
  }

  function selectPrototype(id) {
    selected = id;
    const p = prototypes.find(x => x.id === id);
    if (!p) return;

    const frame = document.getElementById('previewFrame');
    frame.classList.add('active');
    document.getElementById('infoWrap').style.display = '';

    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = '';
    overlay.classList.remove('hidden');
    frame.onload = () => {
      overlay.classList.add('hidden');
      setTimeout(() => { overlay.style.display = 'none'; }, 300);
    };
    frame.src = p.path;

    document.getElementById('infoName').textContent = p.name;
    document.getElementById('infoDesc').textContent = p.description;
    document.getElementById('infoDate').textContent = formatDateLong(p.created);
    document.getElementById('infoProject').textContent = p.project;
    document.getElementById('openBtn').href = p.path;

    if (tocOpen) renderToc();
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function formatDateLong(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  init();
</script>

</body>
</html>
