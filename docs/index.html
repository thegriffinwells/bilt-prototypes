<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>Bilt — Prototype Hub</title>
<script>
  // Hub redirects to the latest prototype — TOC nav lives on each page
  const prototypes = [
    { id: 'ai-concierge', created: '2026-03-12' },
    { id: 'joist-transfer', created: '2026-03-12' },
    { id: 'points-transfer', created: '2026-03-11' },
    { id: 'travel-checkout', created: '2026-03-10' },
  ];
  // If hash specifies a prototype, go there; otherwise go to latest
  const hash = location.hash.replace('#', '');
  const target = prototypes.find(p => p.id === hash) || prototypes[0];
  location.replace(target.id + '/');
</script>
</head>
<body></body>
</html>
